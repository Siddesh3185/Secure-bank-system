{% extends 'base.html' %}

{% block title %}Login - Secure Bank{% endblock %}

{% block content %}
<div class="container login py-5" style="max-width:420px;">
    <h2 class="text-white mb-4">Customer Login</h2>
    <form method="POST">
        <input type="email" name="email" placeholder="Email" required class="form-control mb-3">
        <input type="password" name="password" placeholder="Password" required class="form-control mb-3">
        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
  </div>
{% endblock %}
