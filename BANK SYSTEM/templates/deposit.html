{% extends 'base.html' %}

{% block title %}Deposit - Secure Bank{% endblock %}

{% block content %}
<div class="container deposit py-5" style="max-width:420px;">
    <h2 class="text-white mb-4">Deposit Money</h2>
    <form method="POST">
        <input type="number" name="amount" placeholder="Enter Amount" required class="form-control mb-3 text-center">
        <button type="submit" class="btn btn-primary w-100">Deposit</button>
    </form>
</div>
{% endblock %}
