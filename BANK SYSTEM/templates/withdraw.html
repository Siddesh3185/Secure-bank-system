{% extends 'base.html' %}

{% block title %}Withdraw - Secure Bank{% endblock %}

{% block content %}
<div class="container withdraw py-5" style="max-width:420px;">
    <h2 class="text-white mb-4">Withdraw Money</h2>
    <form method="POST">
        <input type="number" name="amount" placeholder="Enter Amount" required class="form-control mb-3 text-center">
        <button type="submit" class="btn btn-danger w-100">Withdraw</button>
    </form>
</div>
{% endblock %}
